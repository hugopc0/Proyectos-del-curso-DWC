<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nosotros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&family=PT+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="css/normalize.css" as="style" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="preload" href="css/style.css" as="style" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <div class="contenedor">
        <div class="barra">
          <a href="index.html" class="logo">
            <h1 class="no-margin centrar-texto">Blog<span>DeCafe</span></h1>
          </a>

          <nav>
            <a href="nosotros.html">Nosotros</a>
            <a href="cursos.html">Cursos</a>
            <a href="contacto.html">Contacto</a>
          </nav>
        </div>
      </div>
      <!-- .contenedor -->
      <div class="texto">
        <h2 class="no-margin">Blog de café con consejos y cursos</h2>
        <p class="no-margin">
          Aprende de los expertos con las mejores recetas y consejos
        </p>
      </div>
    </header>

    <main class="contenedor">
      <h3 class="centrar-texto">Contacto</h3>

      <div class="contacto-bg"></div>

      <form action="#">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            placeholder="Tu nombre"
            class="elemento"
          />
        </div>
        <div class="campo">
          <label for="e-mail">E-mail </label>
          <input
            type="email"
            id="e-mail"
            placeholder="Tu e-mail"
            class="elemento"
          />
        </div>
        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea name="" id="mensaje" class="elemento"></textarea>
        </div>
        <div class="campo">
          <input type="submit" value="Enviar" class="boton boton--primario mayuscula" />
        </div>
      </form>
    </main>
    <!-- .contenido-principal -->
    <div class="bk-footer">
      <footer class="contenedor">
        <h2 class="no-margin">Blog<span>DeCafe</span></h2>
        <div class="enlaces">
          <a href="#">Nosotros</a>
          <a href="#">Curso</a>
          <a href="#">Contacto</a>
        </div>
      </footer>
    </div>

    <!-- <script src="script.js"></script> -->
  </body>
</html>
