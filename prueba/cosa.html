<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imagen y Texto</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .image {
      display: block;
      max-width: 400px;
      width: 100%;
      margin: 0 auto 20px;
    }

    .text {
      max-width: 600px;
      margin: 0 auto;
      padding: 10px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* @media (max-width: 600px) {
      .image,
      .text {
        max-width: 100%;
      }
    } */
  </style>
</head>
<body>
  <div class="container">
    <img src="img/hero.jpg" alt="Una imagen" class="image" />
    <div class="text">
      <p>
        Este es el texto que se muestra debajo de la imagen. En pantallas grandes,
        el texto ocupa más ancho que la imagen, pero en móviles ambos se adaptan
        al mismo ancho.
      </p>
    </div>
  </div>
</body>
</html>
